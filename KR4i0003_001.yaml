body:
  text: 卷上序曰氣之動物物之感人故搖蕩性情形諸舞詠欲以照燭三才暉麗萬有靈祇待之以致饗幽微藉之以昭告動天地感鬼神莫近於詩昔南風之辭卿雲之頌厥義敻矣夏歌曰鬱陶乎豫心楚謠曰名余曰正則雖詩體未全然略是五言之濫觴也逮漢李陵始著五言之目矣古詩眇邈人世難詳推其文體固是炎漢之製非衰周之倡也自王楊枚馬之徒詞賦競爽而吟詠靡聞從李都尉迄班婕妤將百年間有婦人焉一人而已詩人之風頓已缺喪東京二百載中惟有班固詠史質木無文降及建安曹公父子篤好斯文平原兄弟鬱為文棟劉楨王粲為其羽翼次有攀龍托鳳自致於屬車者蓋將百計彬彬之盛大備於時矣爾後陵遲衰微迄於有晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沫亦文章之中興也永嘉時貴黃老尚虛談於時篇什理過其辭淡乎寡味爰及江表微波尚傳孫綽許詢桓庾諸公詩皆平典似道德論建安風力盡矣先是郭景純用雋上之才變創其體劉越石仗清剛之氣贊成厥美然彼衆我寡未能動俗逮義熙中謝益壽斐然繼作元嘉中有謝靈運才高詞盛富艷難蹤固已含跨劉郭陵轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顏延年為輔斯皆五言之冠冕文詞之命世也夫四言文約易廣取效風騷便可多得每苦文繁而意少故世罕習焉五言居文詞之要是衆作之有滋味者也故云會於流俗豈不以指事造形窮情寫物最為詳切者邪故詩有六義焉一曰興二曰比三曰賦文已盡而意有餘興也因物喻志比也直書其事寓言寫物賦也弘斯三義酌而用之幹之以風力潤之以丹彩使詠之者無極聞之者動心是詩之至也若專用比興則患在意深意深則詞躓若但用賦體則患在意浮意浮則文散嬉成流移文無止泊有蕪漫之纍矣若乃春風春鳥秋月秋蟬夏雲暑雨冬月祁寒斯四候之感諸詩者也嘉會寄詩以親離群托詩以怨至於楚臣去境漢妾辭宮或骨橫朔野或魂逐飛蓬或負戈外戍殺氣雄邊塞客衣單孀閨淚盡又士有解佩出朝一去忘返女有揚娥入寵再盻傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以騁其情故曰詩可以群可以怨使窮賤易安幽居靡悶莫尚於詩矣故詞人作者罔不愛好今之士俗斯風熾矣才能勝衣甫就小學必甘心而馳騖焉於是庸音雜體各各為容至使膏腴子弟恥文不逮終朝點綴分夜呻吟獨觀謂為警策衆覩終淪平鈍次有輕薄之徒笑曹劉為古拙謂鮑昭羲皇上人謝朓今古獨步而師鮑昭終不及日中市朝滿學謝朓劣得黃鳥度青枝徒自棄於高聽無涉於文流矣觀王公搢紳之士每博論之餘何嘗不以詩為口實隨其嗜欲商榷不同淄澠並泛朱紫相奪喧議競起準的無依近彭城劉士章俊賞之士疾其淆亂欲為當世詩品口陳標榜其文未遂嶸感而作焉昔九品論人七略裁士校以賓實誠多未值至若詩之為技較爾可知以類推之殆均博奕方今皇帝資生知之上才體沉鬱之幽思文麗日月學究天人昔在貴遊已為稱首況八紘既奄風靡雲蒸抱玉者聯肩握珠者踵武固以瞰漢魏而不顧吞晉宋於胸中諒非農歌轅議敢致流別嶸之今録庶周旋於閭里均之於談笑耳其體源出於國風陸機所擬十二首文溫以麗意悲而遠驚心動魄可謂幾乎一字千金其外去者日以疏四十五首雖多哀怨頗為總雜舊疑是建安中曹王所製客從遠方來橘柚垂華實亦為驚絶矣人代冥滅而清音獨遠悲夫漢都尉李陵詩其源出於楚辭文多悽愴怨者之流陵名家子有殊才生命不諧聲頽身喪使陵不遭辛苦其文亦何能至此其源出於李陵團扇短章辭旨清捷怨深文綺得匹婦之致侏儒一節可以知其工矣其源出於國風骨氣高奇詞彩華茂情兼雅怨體被文質粲溢今古卓爾不群嗟乎陳思之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有琴笙女工之有黼黻俾爾懷鉛吮墨者抱篇章而景慕映餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣其源出於古詩仗氣愛奇動多振絶貞骨凌霜高風跨俗但氣過其文雕潤恨少然自陳思已下楨稱獨步其源出於李陵發愀愴之詞文秀而質羸在曹劉間別構一體方陳思不足比魏文有餘晉步兵阮籍詩其源出於小雅雖無雕蟲之巧而詠懷之作可以陶性靈發幽思言在耳目之內情寄八荒之表洋洋乎會於風雅使人忘其鄙近自致遠大頗多感慨之詞厥旨淵放歸趣難求顏延注解怯言其志晉平原相陸機詩其源出於陳思才高辭贍舉體華美氣少於公幹文劣於仲宣尚規矩不貴綺錯有傷直致之奇然其咀嚼英華厭飫膏澤文章之淵泉也張公歎其大才信矣其源出於仲宣翰林歎其翩翩奕奕如翔禽之有羽毛衣被之有綃縠猶淺於陸機謝混云潘詩爛若舒錦無處不佳陸文如披沙簡金往往見寶嶸謂益壽輕華故以潘勝翰林篤論故歎陸為深余常言陸才如海潘才如江其源出於王粲文體華淨少病纍又巧構形似之言雄於潘嶽靡於太沖風流調達實曠代之高才詞彩蔥蒨音韻鏗鏘使人味之亹亹不倦其源出於公幹文典以怨頗為清切得諷諭之致雖淺於陸機而深於潘嶽謝康樂常言左太沖詩潘安仁詩古今難比其源出於陳思雜有景陽之體故尚巧似而逸蕩過之頗以繁蕪為纍嶸謂若人學多才博寓目輒書內無乏思外無遺物其繁富宜哉然名章迥句處處間起麗曲新聲絡繹奔發譬猶青松之拔灌木白玉之映塵沙未足貶其高潔也初錢塘杜明師夜夢東南有人來入其館是夕即靈運生於會稽旬日而謝安亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒
