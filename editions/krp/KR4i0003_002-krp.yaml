  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0003_WYG_002-1a, image: WYG1478/WYG1478-0194a.png}
body:
  text: 詩品巻二梁鍾嶸撰一品之中略以世代為先後不以優劣為詮次又其人既往其文克定今所寓言不録存者夫屬詞比事乃為通談若乃經國文符應資博古撰徳駮奏宜窮往烈至乎吟詠情性亦何貴於用事思君如流水既是即目髙臺多悲風亦唯所見清晨登隴首羌無故實明月照積雪詎出經史觀古今勝語多非補假皆由直尋顔延謝莊尤為繁宻於時化之故大明泰始中文章殆同書抄近任昉王元長等辭不貴竒競須新事爾來作者寖以成俗遂乃句無虚語語無虚字拘攣補衲蠧文已甚但自然英㫖罕值其人詞既失髙則宜加事義雖謝天才且表學問亦一理乎陸機文賦通而無貶李充翰林疎而不切王微鴻寶宻而無裁顔延論文精而難曉摯虞文志詳而博贍頗曰知言觀斯數家皆就談文體而不顯優劣至於謝客集詩逢詩輒取張隲文士逢文即書諸英志録並義在文曾無品第嶸今所録止乎五言雖然網羅今古詞文始集輒欲辨彰清濁掎摭病利凡百二十人預此宗流者便稱才子至斯三品升降差非定制方申變裁請寄知者爾漢上計秦嘉詩嘉妻徐淑詩夫妻事既可傷文亦悽怨為五言者不過數家而婦人居二徐淑敘别之作亞於團扇矣魏文帝詩其源出於李陵頗有仲宣之體而乏新竒百許篇率皆鄙直如偶語惟西北有浮雲十餘首殊美贍可翫始見其工矣不然何以銓衡羣彦對揚厥弟者耶晉中散嵇康詩頗似魏文過為峻切訐直露才傷淵雅之致然託喻清逺良有鍳裁亦未失其髙流矣晉司空張華詩其源出於王粲其體華艷興託不竒巧用文字務為妍冶雖名髙曩代而疏亮之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體耳今置之中品疑弱處之下科恨少在季孟之間矣魏尚書何晏詩晉馮翊守孫楚詩晉著作王贊詩晉王司徒掾張翰詩晉中書令潘尼詩平叔鴻雁之篇風規見矣子荆零雨之外正長朔風之後雖有累札良亦無聞季鷹黄華之唱正叔緑蘩之良雖不具美而文彩髙麗並得虯龍片甲鳯凰一毛事同駮聖宜居中品魏侍中應璩詩祖襲魏文善為古語指事殷勤雅意深篤得詩人激刺之㫖至於濟濟今日所華靡可諷味焉晉清河守陸雲詩晉侍中石崇詩晉襄城太守曹攄詩晉朗陵公何劭詩清河之方平原殆如陳思之匹白馬于其哲昆故稱二陸季倫顔逺並有英篇篤而論之朗陵為最晉太尉劉琨詩晉中郎盧諶詩其源出於王粲善為悽戾之辭自有清拔之氣琨既體良才又罹厄運故善敘喪亂多感恨之詞中郎仰之微不逮者矣晉𢎞農太守郭璞詩憲章潘岳文體相輝彪炳可翫始變永嘉平淡之體故稱中興第一翰林以為詩首但遊仙之作辭多慷慨乖逺𤣥宗而云奈何虎豹姿又云戢翼棲榛梗乃是坎壈詠懷非列仙之趣也晉吏部郎袁宏詩彦伯詠史雖文體未遒而鮮明緊健去凡俗逺矣晉處士郭泰機詩晉常侍顧愷之詩宋謝世基宋參軍顧邁詩宋參軍戴凱詩泰機寒女之製孤怨宜恨長康能以二韻答四首之美世基横海顧邁鴻飛戴凱人實貧羸而才章富健觀此五子文雖不多氣調警拔吾許其進則鮑昭江淹未足逮止越居中品僉曰宜哉宋徴士陶潜詩其源出於應璩又協左思風力文體省浄殆無長語篤意真古辭興婉愜毎觀其文想其人徳世歎其質直至如歡言酌春酒日暮天無雲風華清靡豈直為田家語耶古今隠逸詩人之宗也宋光禄大夫顔延之詩其源出於陸機尚巧似體裁綺宻情喻淵深動無虚散一句一字皆致意焉又喜用古事彌見拘束雖乖秀逸是經綸文雅才雅才減若人則蹈於困躓矣湯惠休曰謝詩如芙蓉出水顔如錯彩鏤金顔終身病之宋豫章太守謝瞻詩宋僕射謝混詩宋太尉袁淑詩宋徵君王微詩宋征虜將軍王僧達詩其源出於張華才力苦弱故務其清淺殊得風流媚趣課其實録則豫章僕射宜分庭抗禮徵君太尉可託乘後車征虜卓卓殆欲度驊騮前驅矣宋法曹叅軍謝惠連詩小謝才思富捷恨其蘭玉夙凋故長轡未騁秋懷擣衣之作雖復靈運銳思亦何以加焉又工為綺麗歌謡風人第一謝氏家録云康樂毎對惠連輒得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即成池塘生春草故常云此語有神助非吾語也宋參軍鮑昭詩其源出於二張善製形狀寫物之詞得景陽之諔詭含茂先之靡嫚骨節强於謝混驅邁疾於顔延總四家而擅美跨兩代而孤出嗟其才秀人微故取湮當代然貴尚巧似不避危仄頗傷清雅之調故言險俗者多以附昭齊吏部謝朓詩其源出於謝混微傷細宻頗在不倫一章之中自有玉石然竒章秀句往往警遒足使叔源失歩明逺變色善自發詩端而末篇多躓此意銳而才弱也至為後進士子之所嗟慕脁極與余論詩感激頓挫過其文齊光禄江淹詩文通詩體總雜善於摹擬筋力於王微成就於謝脁初淹罷宣城郡遂宿冶亭夢一美大夫自稱郭璞謂淹曰吾有筆在卿處多年矣可以見還淹探懷中得五色筆以授之爾後為詩不復成語故世傳江淹才盡梁衛將軍范雲詩梁中書郎丘遲詩范詩清便宛轉如流風迴雪丘詩㸃綴暎媚似落花依草故當淺於江淹而秀於任昉梁太常任昉詩彦昇少年為詩不工故世稱沈詩任筆昉深恨之晚節愛好既篤文亦遒變若銓事理拓體淵雅得國士之風故擢居中品但昉既博物動輒用事所以詩不得竒少年士子效其如此弊矣梁左光禄沈約詩觀休文衆製五言最優詳其文體察其餘論固知憲章鮑明逺也所以不閑於經綸而長於清怨永明相王愛文王元長等皆宗附之約于時謝朓未遒江淹才盡范雲名級故微故約稱獨歩雖文不至其工麗亦一時之選也見重閭里誦詠成音嶸謂約所著既多今翦除涇雜收其精要允為中品之第矣故當詞宻於范意淺於江也詩品巻二
