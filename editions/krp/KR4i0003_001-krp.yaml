  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0003_WYG_001-1a, image: WYG1478/WYG1478-0190c.png}
body:
  text: 詩品巻一梁鍾嶸撰氣之動物物之感人故揺蕩性情形諸歌詠照燭三才暉麗萬有靈祇待之以致饗幽微藉之以昭告動天地感鬼神莫近於詩昔南風之詞卿雲之頌厥義敻矣夏歌曰鬱陶乎予心楚謡曰名余曰正則雖詩體未全然是五言之濫觴也逮漢李陵始著五言之目矣古詩眇邈人世難詳推其文體固是炎漢之製非衰周之倡也自王楊枚馬之徒詞賦競爽而吟咏靡聞從李都尉迄班婕妤將百年間有婦人焉一人而已詩人之風頓以缺喪東京二百載中惟有班固詠史質朩無文降及建安曹公父子篤好斯文平原兄弟鬱為文棟劉楨王粲為其羽翼次有攀龍托鳳自致於屬車者蓋將百計彬彬之盛大備於時矣是後陵遲衰微迄於有晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沫亦文章之中興也永嘉時貴黄老稍尚虚談于時篇什理過其辭淡乎寡味爰及江表微波尚傳孫綽許詢桓庾諸公詩皆平典似道徳論建安風力盡矣先是郭景純用雋上之才變創其體劉越石仗清剛之氣贊成厥美然彼衆我寡未能動俗逮義熈中謝益壽斐然繼作元嘉中有謝靈運才髙詞盛富艷難蹤固已含跨劉郭陵轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顔延年為輔斯皆五言之冠冕文詞之命世也夫四言文約意廣取效風騷便可多得毎苦文繁而意少故世罕習焉五言居文詞之要是衆作之有滋味者也故云㑹於流俗豈不以指事造形窮情寫物最為詳切者邪故詩有三義焉一曰興二曰比三曰賦文已盡而義有餘興也因物喻志比也直書其事寓言寫物賦也𢎞斯三義酌而用之幹之以風力潤之以丹彩使味之者無極聞之者動心是詩之至也若專用比興則患在意深意深則詞躓若但用賦體則患在意浮意浮則文散體成流移文無止泊有蕪漫之累矣若乃春風春鳥秋月秋蟬夏雲暑雨冬月祁寒斯四候之感諸詩者也嘉㑹寄詩以親離羣託詩以怨至於楚臣去境漢妾辭宫或骨横朔野或魂逐飛蓬或負戈外戍殺氣雄邊塞客衣單孀閨淚盡文士有解佩出朝一去忘返女有揚娥入寵再盻傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以騁其情故曰詩可以羣可以怨使窮賤易安幽居靡悶莫尚於詩矣故詞人作者罔不愛好今之士俗斯風熾矣纔能勝衣甫就小學必甘心而馳騖焉於是庸音雜體人各為容至使膏腴子弟耻文不逮終朝㸃綴分夜呻吟獨觀謂為警策衆覩終淪平鈍次有輕薄之徒笑曹劉為古拙謂鮑昭羲皇上人謝朓今古獨步而師鮑昭終不及日中市朝滿學謝朓劣得黄鳥度金枝徒自棄於髙聽無渉於文流矣觀王公搢紳之士毎博論之餘何嘗不以詩為口實隨其嗜慾商㩁不同淄澠竝汎朱紫相奪喧議競起凖的無依近彭城劉士章俊賞之士疾其淆亂欲為當世詩品口陳標榜其文未遂感而作焉昔九品論人七略裁士校以賔實誠多未值至若詩之為技較爾可知以類推之殆均博奕方今皇帝資生知之上才體沉鬱之幽思文麗日月賞究天人昔在貴游已為稱首況八紘既奄風靡雲蒸抱玉者聯肩握珠者踵武以瞰漢魏而不顧吞晉宋於胸中諒非農歌轅議敢致流别嶸之今録庶周旋於閭里均之於談笑爾古詩其體源出於國風陸機所擬十四首文温以麗意悲而逺驚心動魄可謂㡬乎一字千金其外去者日已疎四十五首雖多哀怨頗為總雜舊疑是建安中曹王所製客從逺方來橘柚垂華實亦為驚絶矣人代㝠滅而清音獨逺悲夫漢都尉李陵詩其源出於楚辭文多悽怨者之流陵名家子有殊才生命不諧聲頽身䘮使陵不遭辛苦其文亦何能至此漢婕妤班姬詩其源出於李陵團扇短章辭㫖清捷怨深文綺得匹婦之致侏儒一節可以知其工矣魏陳思王植詩其源出於國風骨氣竒髙詞彩華茂情兼雅怨體被文質粲溢今古卓爾不羣嗟乎陳思之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有琴笙女工之有黼黻俾爾懷鈆吮墨者抱篇章而景慕暎餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣魏文學劉楨詩其源出於古詩仗氣愛竒動多振絶真骨淩霜髙風跨俗但氣過其文雕潤恨少然自陳思己下楨稱獨歩魏侍中王粲詩其源出於李陵發愀愴之詞文秀而質羸在曹劉間别構一體方陳思不足比魏文有餘晉歩兵阮籍詩其源出於小雅無雕虫之功而詠懷之作可以陶性靈發幽思言在耳目之内情寄八荒之表洋洋乎㑹於風雅使人忘其鄙近自致逺大頗多感慨之詞厥㫖淵放歸趣難求顔延註解能言其志晉平原相陸機詩其源出於陳思才髙辭贍舉體華美氣少於公幹文劣於仲宣尚規矩不貴綺錯有傷直致之竒然其咀嚼英華厭飫膏澤文章之淵泉也張公歎其大才信矣晉黄門郎潘岳詩其源出於仲宣翰林歎其翩翩然如翔禽之有羽毛衣服之有綃縠猶淺於陸機謝混云潘詩爛若舒錦無處不佳陸文如披沙簡金往往見寶嶸謂益壽輕華故以潘為勝翰林篤論故歎陸為深余嘗言陸才如海潘才如江晉黄門郎張協詩其源出於王粲文體華浄少病累又巧構形似之言雄於潘岳靡於太沖風流調達實曠代之髙手詞彩葱蒨音韻鏗鏘使人味之亹亹不倦晉記室左思詩其源出於公幹文典以怨頗為精切得諷諭之致雖野於陸機而深於潘岳謝康樂常言左太沖詩潘安仁詩古今難比宋臨川太守謝靈運詩其源出於陳思雜有景陽之體故尚巧似而逸蕩過之頗以繁蕪為累嶸謂若人興多才髙博寓目輒書内無乏思外無遺物其繁富宜哉然名章迥句處處間起麗典新聲絡繹奔㑹譬猶青松之㧞灌朩白玉之暎塵沙未足貶其髙潔也初錢塘杜明師夜夢東南有人來入其館是夕即靈運生於㑹稽旬日而謝𤣥亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒治音稚奉道之之家靖室也詩品巻一
