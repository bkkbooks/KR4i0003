  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0003_WYG_003-1a, image: WYG1478/WYG1478-0198a.png}
body:
  text: 詩品巻三梁鍾嶸撰昔曹劉殆文章之聖陸謝為體二之才銳精研思千百年中而不聞宫商之辨四聲之論或謂前達偶然不見豈其然乎嘗試言之古者詩頌皆被之金竹故非調五音無以諧㑹若置酒髙堂上明月照髙樓為韻之首故三祖之詞文或不工而韻入歌唱此重音韻之義也與世之言宫商異矣今既不備管絃亦何取於聲律耶齊有王元長者嘗謂余云宫商與二儀俱生自古詞人不知之唯顔憲子乃云律吕音調而其實大謬唯見范曄謝莊頗識之耳常欲造知音論未就王元長創其首謝脁沈約揚其波三賢或貴公子孫幼有文辨於是士流景慕務為精宻襞積細微專相淩架故使文多拘忌傷其真美余謂文製本須諷讀不可蹇礙但令清濁通流口吻調利斯為足矣至平上去入則余病未能蜂腰鶴膝閭里已具陳思贈弟仲宣七哀公幹思友阮籍詠懷子卿雙鳬叔夜雙鸞茂先寒夕平叔衣單安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純詠仙王微風月謝客山泉叔源離宴鮑昭戍邊太冲詠史顔延入洛陶公詠貧之製惠連𢷬衣之作斯皆五言之警䇿者也所謂篇章之珠澤文彩之鄧林漢令史班固詩漢孝亷酈炎詩漢上計趙壹詩孟堅才流而老於掌故觀其詠史有感歎之詞文勝託詠靈芝觀懷寄不淺元叔散憤蘭蕙指斥囊錢苦言切句良亦勤矣斯人也而有斯困悲夫魏武帝詩魏明帝詩曹公古直甚有悲涼之句叡不如丕亦稱三祖魏白馬王彪詩魏文學徐幹詩白馬與陳思答贈偉長與公幹往復雖曰以莛扣鐘亦能閑雅矣魏倉曹屬阮瑀詩晉頓丘太守歐陽建詩晉文學應璩詩晉中書令嵇含詩晉河南太守阮偘詩晉侍中嵇紹詩晉黄門棗據詩元瑜堅石七君詩並平典不失古體大檢似而二嵇微優矣晉中書張載詩晉司𨽻傅𤣥詩晉太僕傅咸詩晉侍中繆襲詩晉散騎常侍夏侯湛詩孟陽詩乃逺慙厥弟而近超兩傅長虞父子繁富可嘉孝沖雖曰後進見重安仁熈伯挽歌唯以造哀爾晉驃騎王濟詩晉征南將軍杜預詩晉廷尉孫綽詩晉徵士許詢詩永嘉以來清虚在俗王武子輩詩貴道家之言爰洎江表𤣥風尚備真長仲祖桓庾諸公猶相襲世稱孫許彌善恬淡之詞晉徴士戴逵詩晉東陽太守殷仲文詩晉宋之際殆無詩乎義熈中以謝益壽殷仲文為華綺之冠殷不競矣宋尚書令傳亮詩季友文余常忽而不察今沈特進撰詩載其數首亦復平矣宋記室何長瑜詩宋羊曜璠詩宋詹事范曄詩乃不稱其才亦為鮮舉矣宋孝武帝詩宋南平王鑠詩宋建平王宏詩孝武詩彫文織綵過為精宻為二藩希慕見稱輕巧矣宋光禄謝莊詩希逸詩氣候清雅不逮於王袁然興屬閑長良無鄙促也宋御史蘇寶生詩宋中書令史陵修之詩宋典祠令任曇緒詩宋越騎戴法興詩蘇陵任戴並著篇章亦為搢紳之所嗟咏人非文才是愈甚可嘉焉宋監典事區惠恭詩惠恭本胡人為顔師伯幹顔為詩筆輒偷定之後造獨樂賦語侵給主被斥及大將軍修北第差充作長時謝惠連兼記室參軍惠恭時往共安陵嘲調末作雙枕詩以示謝謝曰君誠能恐人未重且可以為謝法曹造遺大將軍見之賞歎以錦二端賜謝謝辭曰此詩公作長所製請以錦賜之齊惠休上人詩齊道猷上人詩齊釋寶月詩惠休淫靡情過其才世遂疋之鮑昭恐商周矣羊曜璠云是顔公忌昭之文故立休鮑之論庾白二胡亦有清句行路難是東陽柴廓所造寶月嘗憩其家㑹廓亡因竊而有之廓子賫手本出都欲訟此事乃厚賂止之齊髙帝詩齊征北將軍張永詩齊太尉王文憲詩齊髙帝詩詞藻意深無所云少張景雲雖謝文體頗有古意至如王師文憲既經國圖逺或忽是雕蟲齊黄門謝超宗詩齊潯陽太守丘靈鞠詩齊給事中郎劉祥詩齊司徒長史檀超詩齊正員郎鍾憲詩齊諸暨令顔則詩齊秀才顧則心詩檀謝七君並祖襲顔延欣欣不倦得士大夫之雅致乎余從祖正員常云大明泰始中鮑休美文殊已動俗唯此諸人傅顔陸體用固執不如顔諸暨最荷家聲齊參軍毛伯成詩齊朝請吳邁逺詩齊朝請許謡之詩伯成文不全佳亦多惆悵吳善於風人答贈許長於短句詠物湯休謂逺云吾詩可為汝詩父以訪謝光禄云不然爾湯可為庶兄齊鮑令暉詩齊韓蘭英詩令暉歌詩往往斷絶清巧擬古尤勝唯百願淫矣昭嘗答孝武云臣妹才自亞於左芬臣才不及太沖爾蘭英綺宻甚有名篇又善談笑齊武謂韓云借使二媛生於上葉則玉階之賦紈素之辭未詎多也齊司徒長史張融詩齊詹事孔稚珪詩思光紆緩誕放縱有乖文體然亦㨗疾豐饒差不局促徳璋生於封谿而文為彫飾青於藍矣齊寧朔將軍王融詩齊中庶子劉繪詩元長士章並有盛才詞美英浄至於五言之作幾乎尺有所短譬應變將略非武侯所長未足以貶臥龍齊僕射江祏詩猗猗清潤弟祀明靡可懷齊記室王巾詩齊綏逺太守卞彬詩齊端溪令卞録詩王巾二卞詩並愛竒嶄絶慕袁彦伯之風雖不𢎞綽而文體剿浄去平美逺矣齊諸暨令袁嘏詩平平耳多自謂能常語徐太尉云我詩有生氣須人捉著不爾便飛去齊雍州刺史張欣泰詩梁中書郎范縝詩欣泰子真並希古勝文鄙薄俗製賞心流亮不失雅宗梁秀才陸厥詩觀厥文緯具識丈夫之情狀自製未優非言之失也梁常侍虞羲詩梁建陽令江洪詩子陽詩竒句清拔謝朓嘗嗟頌之洪雖無多亦能自迥出梁歩兵鮑行卿詩梁晉陵令孫察詩行卿少年甚擅風謡之美察最幽微而感賞至到爾詩品巻三
