body:
  text: 詩品詩文評類提要臣等謹案詩品三巻梁鍾嶸撰嶸字仲偉潁川長社人與兄岏弟嶼並好學有名齊永明中為國子生王儉舉本州秀才起家王國侍郎入梁仕至晉安王記室卒於官嶸學通周易詞藻兼長所品古今五言詩自漢魏以來一百有三人論其優劣分為上中下三品毎品之首各冠以序皆妙達文理可與文心雕龍並稱近時王士禎極論其品第之間多所違失然梁代迄今邈踰千祀遺篇舊製什九不存未可以掇拾碊文定當日全集之優劣惟其論某人源出某人若一一親見其師承者則不免附會耳史稱嶸嘗求譽于沈約約弗為奬借故嶸怨之列約中品案約立之中品未為排抑惟序中深詆聲律之學謂蜂腰鶴膝僕病未能雙聲叠韻里俗已具是則攻擊約説顯然可見史言亦不盡無因也又一百三人之中惟王融稱王元長不著其名或疑其有所私尊然徐陵玉臺新詠亦惟融書字盖齊梁之間避齊和帝之諱故以字行實無他故今亦姑仍原本以存其舊焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2f371192f9b0da7f9e3e513b11117e19f958c3a3bb6c1a8b12ec16cdc4f76dc9
