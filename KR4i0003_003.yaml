body:
  text: 卷下序曰昔曹劉殆文章之聖陸謝為體貳之才銳精研思千百年中而不聞宮商之辨四聲之論或謂前達偶然不見豈其然乎嘗試言之古曰詩頌皆被之金竹故非調五音無以諧會若置酒高殿上明月照高樓為韻之首故三祖之詞文或不工而韻入歌唱此重音韻之義也與世之言宮商異矣今既不備於管絃亦何取於聲律耶齊有王元長者常謂余云宮商與二儀俱生自古詞人不知用之惟顏憲子論文乃云律呂音調而其實大謬唯見范曄謝莊頗識之耳常欲造知音論未就而卒王元長創其首謝朓沈約揚其波三賢咸貴公子孫幼有文辨於是士流景慕務為精密擗績細微專相凌架故使文多拘忌傷其真美余謂文製本須諷讀不可蹇礙但令清濁通流唇吻調利斯為足矣至如平上去入則余病未能蜂腰鶴膝閭里已甚陳思贈弟仲宣七哀公幹思友阮籍詠懷少卿雙鳧叔夜雙鸞茂先寒夕平叔衣單安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純遊仙王微風月謝客山泉叔源離宴鮑照戍邊太沖詠史顏延入洛陶公詠貧之製惠連擣衣之作斯皆五言之警策者也所謂篇章之珠澤文彩之鄧林孟堅才流而老於掌故觀其詠史有感歎之詞文勝託詠靈芝懷寄不淺元叔散憤蘭蕙指斥囊錢苦言切句良亦勤矣斯人也而有斯困悲夫曹公古直甚有悲涼之句叡不如丕亦稱三祖魏白馬王彪魏文學徐幹白馬與陳思答贈偉長與公幹往復雖曰以莛扣鍾亦能閑雅矣魏倉曹屬阮瑀晉頓丘太守歐陽建晉文學應瑒晉中書嵇含晉河內太守阮侃晉侍中嵇紹晉黃門棗據元瑜堅石七君詩並平典不失古體大檢似而二嵇微優矣晉中書張載晉司隸傅玄晉太僕傅咸魏侍中繆襲晉散騎常侍夏侯湛孟陽詩乃遠慚厥弟而近超兩傅長虞父子繁富可嘉孝若雖曰後進見重安仁熙伯挽歌唯以造哀爾晉驃騎王濟晉征南將軍杜預晉廷尉孫綽晉徵士許詢永嘉以來清虛在俗王武子輩詩貴道家之言爰洎江表玄風尚備真長仲祖桓庾諸公猶相襲世稱孫許彌善恬淡之詞安道詩雖嫩弱有清上之句裁長補短袁彥伯之亞乎逵子顒亦有一時之譽晉東陽太守殷仲文晉宋之際殆無詩乎義熙中以謝益壽殷仲文為華綺之冠殷不競矣季友文余常忽而不察今沈特進撰詩載其數首亦復平矣美宋記室何長瑜羊曜璠才難信矣以康樂與羊何若此而二人文辭殆不足奇蔚宗詩乃不稱其才亦為鮮舉矣宋孝武帝宋南平王鑠宋建平王宏孝武詩雕文織彩過為精密為二藩希慕見稱輕巧矣希逸詩氣候清雅不逮於王袁然興屬閑長良無鄙促也宋御史蘇寶生宋中書令史陵修之宋典祠令任曇緒宋越騎戴法興蘇陵任戴並著篇章亦為搢紳之所嗟詠人非文才是愈甚可嘉焉惠恭本胡人為顏師伯幹顏為詩筆輒偷定之後造獨樂賦語侵給主被斥及大將軍修北第差充作長時謝惠連兼記室參軍惠恭時往共安陵嘲調末作雙枕詩以示謝謝曰君誠能恐人未重且可以為謝法曹造遺大將軍見之賞歎以錦二端賜謝謝辭曰此詩公作長所製請以錦賜之齊惠休上人齊道猷上人齊釋寶月惠休淫靡情過其才世遂匹之鮑照恐商周矣羊曜璠云是顏公忌照之文故立休鮑之論康帛二胡亦有清句行路難是東陽柴廓所造寶月嘗憩其家會廓亡因切而有之廓子齎手本出都欲訟此事乃厚賂止之齊高帝宋征北將軍張永齊太尉王文憲齊高帝詩詞藻意深無所云少張景雲雖謝文體頗有古意至如王師文憲既經國圖遠或忽是雕蟲齊黃門謝超宗齊潯陽太守丘靈鞠齊給事中郎劉祥齊司徒長史檀超齊正員郎鍾憲齊諸暨令顏測齊秀才顧則心檀謝七君並祖襲顏延欣欣不倦得士大夫之雅致乎余從祖正員常云大明泰始中鮑休美文殊已動俗唯此諸人傳顏陸體用固執不移顏諸暨最荷家聲晉參軍毛伯成宋朝請吳邁遠齊朝請許瑤之伯成文不全佳亦多惆悵吳善於風人答贈許長於短句詠物湯休謂遠云吾詩可為汝詩父以訪謝光祿云不然爾湯可為庶兄齊鮑令暉齊韓蘭英令暉歌詩往往嶄絕清巧擬古尤勝惟百韻淫雜矣照常答孝武云臣妹才自亞於左芬臣才不及太沖爾蘭英綺密甚有名篇又善談笑齊武以為韓公借使二媛生於上葉則玉階之賦紈素之辭未詎多也齊司徒長史張融齊詹事孔稚珪思光詩緩誕放縱有乖文體然亦捷疾豐饒差不局促德璋生於封谿而文為雕飾青於藍矣元長士章並有盛才詞美英淨至於五言之作幾乎尺有所短譬應變將略非武侯所長未足以貶臥龍齊僕射江祏祏詩猗猗清潤弟祀明靡可懷齊記室王屮齊綏建太守卞彬齊端溪令卞鑠王屮二卞詩並愛奇嶄絕慕袁彥伯之風雖不弘綽而文體勦淨去平美遠矣嘏詩平平耳多自謂能常語徐大保尉云我詩有生氣須人捉著不爾便飛去欣泰子真並希古勝文鄙薄俗製賞心流亮不失雅宗觀厥文緯具識文之情狀自製未優非言之失也子陽詩奇句清拔謝朓常嗟頌之洪雖無多亦能自迥出行卿少年甚擅風謠之美察最幽微而感賞至到耳
