body:
  text: 卷中序曰一品之中略以世代為先後不以優劣為詮次又其人既往其文克定今所寓言不錄存者夫屬詞比事乃為通談若乃經國文符應資博古撰德駁奏宜窮往烈至乎吟詠情性亦何貴於用事思君如流水既是即目高臺多悲風亦唯所見清晨登隴首羌無故實明月照積雪詎出經史觀古今勝語多非補假皆由直尋顏延謝莊尤為繁密於時化之故大明泰始中文章殆同書抄近任昉王元長等辭不貴奇競須新事爾來作者寖以成俗遂乃句無虛語語無虛字拘攣補納蠹文已甚但自然英旨罕值其人詞既失高則宜加事義雖謝天才且表學問亦一理乎陸機文賦通而無貶李允翰林疏而不切王微鴻寶密而無裁顏延論文精而難曉摯虞文志詳而博贍頗曰知言觀斯數家皆就談文體而不顯優劣至於謝客集詩逢詩輒取張隱文士逢文即書諸英志錄並義在文曾無品第嶸今所錄止乎五言雖然網羅今古詞人殆集輕欲辨彰清濁掎摭病利凡百二十人預此宗流者便稱才子至斯三品升降差非定制方申變裁請寄知者爾士會夫妻事既可傷文亦悽怨二漢為五言者不過數家而婦人居二徐淑敘別之作亞於團扇矣其源出於李陵頗有仲宣之體則新歌百許篇率皆鄙直如偶語惟西北有浮雲十餘首殊美贍可翫始見其工矣不然何以銓衡群彥對揚厥弟者耶頗似魏文過為峻切訐直露才傷淵雅之致然託諭清遠良有鑒裁亦未失高流矣其源出於王粲其體華艷興託多奇巧用文字務為妍冶雖名高曩代而疏亮之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體耳今置之甲科疑弱處之下科恨少在季孟之間矣魏尚書何晏晉馮翊守孫楚晉著作王贊晉司徒掾張翰晉中書令潘尼平叔鴻雁之篇風規見矣子荊零雨之外正長朔風之後雖有累札良亦無聞季鷹黃華之唱正叔綠蘩之章雖不具美而文彩高麗並得虬龍片甲鳳凰一毛事同駁聖宜居中品魏侍中應璩詩祖襲魏文善為古語指事殷勤雅意深篤得詩人激刺之旨至於濟濟今日所華靡可諷味焉晉清河守陸雲晉侍中石崇晉襄城太守曹攄晉朗陵公何劭清河之方平原殆如陳思之匹白馬于其哲昆故稱二陸季倫顏遠並有英篇篤而論之朗陵為最晉太尉劉琨晉中郎盧諶詩其源出於王粲善為悽戾之詞且有清拔之氣琨既體良才又罹厄運故善敘喪亂多感恨之詞中郎仰之微不逮者矣憲章潘岳文體相暉彪炳可玩始變中原平淡之體故稱中興第一翰林以為詩首但游仙之作辭多慷慨乖遠玄宗而云柰何虎豹姿又云戢翼棲榛梗乃是坎壈詠懷非列仙之趣也彥伯詠史雖文體未遒而鮮明緊健去凡俗遠矣晉處士郭泰機晉常侍顧愷之宋謝世基宋參軍顧邁宋參軍戴凱詩泰機寒女之製孤怨宜恨長康能以二韻答四首之美世基橫海顧邁鴻飛戴凱人實貧羸而才章富健觀此五子文雖不多氣調警拔吾許其進則鮑昭江淹未足逮止越居中品僉曰宜哉宋徵士陶潛詩其源出於應璩又協左思風力文體省靜殆無長語篤意真古辭興婉愜每觀其文想其人德世歎其質直至如歡言酌春酒日暮天無雲風華清靡豈直為田家語耶古今隱逸詩人之宗也宋光祿大夫顏延之詩其源出於陸機故尚巧似體裁綺密然情喻淵深動無虛發一句一字皆致意焉又喜用古事彌見拘束雖乖秀逸固是經綸文雅才減若人則陷於困躓矣湯惠休曰謝詩如芙蓉出水顏詩如錯彩縷金顏終身病之宋豫章太守謝瞻晉僕射謝混宋太尉袁淑宋徵君王微宋征虜將軍王僧達詩其源出於張華才力苦弱故務其清淺殊得風流媚趣課其實錄則豫章僕射宜分庭抗禮徵君太尉可託乘後車征虜卓卓殆欲度驊騮前宋法曹參軍謝惠連詩小謝才思富捷恨其蘭玉夙彫故長轡未騁秋懷擣衣之作雖復靈運銳思亦何以加焉又工為綺麗歌謠風人第一謝氏家錄云康樂每對惠連輒得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即成池塘生春草故常云此語有神助非吾語也其源出於二張善製形狀寫物之詞得景陽之諔詭含茂先之靡嫚骨節強於謝混驅邁疾於顏延總四家而擅美跨兩代而孤出嗟其才秀人微故取湮當代然貴尚巧似不避危仄頗傷清雅之調故言險俗者多以附照齊吏部謝朓詩其源出於謝混微傷細密頗在不倫一章之中自有玉石然奇章秀句往往警遒足使叔源失步明遠變色善自發詩端而末篇多躓此意銳而才弱也至為後進士子之所嗟慕朓極與余論詩感激頓挫過其文梁光祿江淹詩文通詩體總雜善於摹擬筋力於王微成就於謝朓初淹罷宣城郡遂宿冶亭夢一美丈夫自稱郭璞謂淹曰吾有筆在卿處多年矣可以見還淹探懷中得一五色筆以授之爾後為詩不復成語故世傳江淹才盡范詩清便宛轉如流風廻雪丘詩點綴映媚似落花依草故當淺於江淹而秀於任昉彥昇少年為詩不工故世稱沈詩任筆昉深恨之晚節愛好既篤文亦遒變善銓事理拓體淵雅得國士之風故擢居中品但昉既博學動輒用事所以詩不得奇少年士子效其如此弊矣梁左光祿沈約詩觀休文眾製五言最優詳其文體察其餘論固知憲章鮑明遠也所以不閑於經綸而長於清怨永明相王愛文王元長等皆宗附之約于時謝朓未遒江淹才盡范雲名級故微故約稱獨步雖文不至其功麗亦一時之選也見重閭里誦詠成音嶸謂約所著既多今剪除淫雜收其精要允為中品之第矣故當詞密於范意淺於江也
